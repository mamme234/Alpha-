<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics — Alpha Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .chart-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 20px;
        }
        .chart-card h3 {
            font-family: 'Black Ops One', cursive;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
        }
        .chart-card canvas {
            max-height: 250px;
            max-width: 100%;
        }
        .analytics-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .analytics-container { padding: 16px 20px; }
            .chart-grid { grid-template-columns: 1fr; }
            .analytics-stats { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .analytics-stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo-wrapper">
                <div class="logo-mark">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" stroke="#440000" stroke-width="5" opacity="0.2" />
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" />
                        <path class="logo-svg-crossbar" d="M 26 56 L 74 56" />
                        <path class="logo-svg-horn" d="M 50 4 L 34 -4 L 44 8" />
                        <path class="logo-svg-horn" d="M 50 4 L 66 -4 L 56 8" />
                        <ellipse class="logo-svg-eye logo-svg-eye-pulse" cx="50" cy="36" rx="7" ry="9" />
                        <polygon class="logo-svg-fang" points="34,56 28,70 40,58" />
                        <polygon class="logo-svg-fang" points="66,56 60,70 72,58" />
                        <circle class="logo-svg-dot" cx="8" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="92" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="50" cy="6" r="2.5" fill="rgba(255,0,0,0.2)" />
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-brand">Alpha</span>
                    <span class="logo-tagline">developers choice</span>
                </div>
            </a>
            <nav class="nav" id="nav">
                <a href="developers.html">Dashboard</a>
                <a href="analytics.html" class="active">Analytics</a>
                <a href="deploy.html">Deploy</a>
                <a href="#" onclick="logout()">Logout</a>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="page-content">
        <div class="analytics-container">
            <div class="dashboard-header">
                <div>
                    <h1 class="dashboard-title">📊 Analytics</h1>
                    <p class="dashboard-subtitle">Track your app performance and user engagement</p>
                </div>
                <div class="dashboard-actions">
                    <select id="timeframe" class="form-control" style="width:auto;padding:6px 12px;font-size:12px;" onchange="updateCharts()">
                        <option value="7d">Last 7 Days</option>
                        <option value="30d">Last 30 Days</option>
                        <option value="90d">Last 90 Days</option>
                        <option value="1y">Last Year</option>
                    </select>
                </div>
            </div>

            <div class="analytics-stats" id="analytics-stats">
                <div class="stat-card">
                    <div class="stat-value" id="stat-downloads">0</div>
                    <div class="stat-label">📥 Total Downloads</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-users">0</div>
                    <div class="stat-label">👥 Active Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-reviews">0</div>
                    <div class="stat-label">⭐ Total Reviews</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-rating">0.0</div>
                    <div class="stat-label">📊 Average Rating</div>
                </div>
            </div>

            <div class="chart-grid">
                <div class="chart-card">
                    <h3>📈 Downloads Over Time</h3>
                    <canvas id="downloads-chart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>👥 User Growth</h3>
                    <canvas id="users-chart"></canvas>
                </div>
            </div>

            <div class="chart-grid" style="margin-top:20px;">
                <div class="chart-card">
                    <h3>🌍 User Locations</h3>
                    <canvas id="locations-chart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>📱 Devices & Platforms</h3>
                    <canvas id="devices-chart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        let charts = {};

        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        function updateCharts() {
            // Simulate data update
            const labels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const downloads = [120, 150, 180, 200, 170, 220, 250];
            const users = [80, 100, 120, 140, 130, 160, 190];

            if (charts.downloads) charts.downloads.destroy();
            if (charts.users) charts.users.destroy();

            charts.downloads = new Chart(document.getElementById('downloads-chart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Downloads',
                        data: downloads,
                        borderColor: '#ff0000',
                        backgroundColor: 'rgba(255,0,0,0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: 'rgba(255,255,255,0.4)' } } },
                    scales: {
                        x: { ticks: { color: 'rgba(255,255,255,0.3)' } },
                        y: { ticks: { color: 'rgba(255,255,255,0.3)' } }
                    }
                }
            });

            charts.users = new Chart(document.getElementById('users-chart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Active Users',
                        data: users,
                        borderColor: '#2ecc71',
                        backgroundColor: 'rgba(46,204,113,0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { legend: { labels: { color: 'rgba(255,255,255,0.4)' } } },
                    scales: {
                        x: { ticks: { color: 'rgba(255,255,255,0.3)' } },
                        y: { ticks: { color: 'rgba(255,255,255,0.3)' } }
                    }
                }
            });

            // Update stats
            document.getElementById('stat-downloads').textContent = '1.2K';
            document.getElementById('stat-users').textContent = '856';
            document.getElementById('stat-reviews').textContent = '342';
            document.getElementById('stat-rating').textContent = '4.8⭐';
        }

        // Hamburger
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger');
            const nav = document.getElementById('nav');
            if (hamburger && nav) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.toggle('active');
                    nav.classList.toggle('open');
                });
                document.querySelectorAll('.nav a').forEach(link => {
                    link.addEventListener('click', () => {
                        hamburger.classList.remove('active');
                        nav.classList.remove('open');
                    });
                });
            }
            const header = document.getElementById('header');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 20) header.classList.add('scrolled');
                else header.classList.remove('scrolled');
            });
            updateCharts();
        });
    </script>
</body>
    </html>
