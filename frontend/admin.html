<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <img src="logo.png" alt="Platform Logo" height="40">
                <span>DevPlatform</span>
            </a>
            <ul class="nav-links">
                <li><a href="admin.html" class="active">Admin</a></li>
                <li><a href="users.html">Users</a></li>
                <li><a href="developers.html">Developers</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
                <li>
                    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">
                        🌓
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding:30px 0;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;">
            <div>
                <h1>Admin Dashboard</h1>
                <p style="color:var(--gray);">Manage the platform</p>
            </div>
            <div style="display:flex;gap:10px;">
                <button class="btn btn-success" onclick="createBackup()">💾 Backup</button>
                <button class="btn btn-danger" onclick="clearCache()">🔄 Clear Cache</button>
            </div>
        </div>

        <!-- System Stats -->
        <div class="dashboard-stats" id="admin-stats">
            <!-- Loaded dynamically -->
        </div>

        <!-- Tabs -->
        <div style="display:flex;gap:20px;border-bottom:2px solid var(--light-gray);margin:30px 0;">
            <button class="btn" onclick="showTab('users')" id="tab-users" style="border-bottom:3px solid var(--primary);border-radius:0;">Users</button>
            <button class="btn" onclick="showTab('apps')" id="tab-apps" style="border-radius:0;">Apps</button>
            <button class="btn" onclick="showTab('reports')" id="tab-reports" style="border-radius:0;">Reports</button>
            <button class="btn" onclick="showTab('security')" id="tab-security" style="border-radius:0;">Security</button>
        </div>

        <!-- Tab Content -->
        <div id="admin-content">
            <!-- Loaded dynamically -->
        </div>
    </div>

    <script type="module">
        import { loadAdminDashboard, showSuccess, showError } from './all.js';
        
        window.showTab = (tab) => {
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.style.borderBottom = 'none';
            });
            document.getElementById(`tab-${tab}`).style.borderBottom = '3px solid var(--primary)';
            
            // Load tab content
            const container = document.getElementById('admin-content');
            container.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Loading ${tab}...</p></div>`;
            
            setTimeout(() => {
                container.innerHTML = `<p>${tab.charAt(0).toUpperCase() + tab.slice(1)} content loaded</p>`;
            }, 1000);
        };
        
        window.createBackup = () => {
            showSuccess('Backup created successfully');
        };
        
        window.clearCache = () => {
            showSuccess('Cache cleared successfully');
        };
        
        document.addEventListener('DOMContentLoaded', loadAdminDashboard);
    </script>
</body>
    </html>
