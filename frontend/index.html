<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha — Developer Platform</title>
    
    <!-- ===== IMPORTS ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>

    <!-- ===== BACKGROUND ===== -->
    <div class="bg-gradient"></div>

    <!-- ===== HEADER ===== -->
    <header class="header" id="header">
        <div class="header-bg"></div>
        <div class="header-inner">

            <!-- Header Logo -->
            <a href="index.html" class="logo-wrapper" id="logoLink">

                <!-- Logo Mark -->
                <div class="logo-mark">
                    <div class="ring-glow"></div>

                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <!-- Shadow -->
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z"
                        stroke="#440000" stroke-width="5" opacity="0.2" />

                        <!-- Main A -->
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" />

                        <!-- Crossbar -->
                        <path class="logo-svg-crossbar" d="M 26 56 L 74 56" />

                        <!-- Horns -->
                        <path class="logo-svg-horn" d="M 50 4 L 34 -4 L 44 8" />
                        <path class="logo-svg-horn" d="M 50 4 L 66 -4 L 56 8" />

                        <!-- Eye -->
                        <ellipse class="logo-svg-eye logo-svg-eye-pulse" cx="50" cy="36" rx="7" ry="9" />

                        <!-- Fangs -->
                        <polygon class="logo-svg-fang" points="34,56 28,70 40,58" />
                        <polygon class="logo-svg-fang" points="66,56 60,70 72,58" />

                        <!-- Fill -->
                        <path class="logo-svg-fill" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" />

                        <!-- Cracks -->
                        <path class="logo-svg-crack" d="M 50 38 L 50 56" />
                        <path class="logo-svg-crack" d="M 36 46 L 44 50" />
                        <path class="logo-svg-crack" d="M 64 46 L 56 50" />

                        <!-- Corner dots -->
                        <circle class="logo-svg-dot" cx="8" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="92" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="50" cy="6" r="2.5" fill="rgba(255,0,0,0.2)" />
                    </svg>
                </div>

                <!-- Logo Text -->
                <div class="logo-text">
                    <span class="logo-brand">Alpha</span>
                    <span class="logo-tagline">developers choice</span>
                </div>
            </a>

            <!-- Navigation -->
            <nav class="nav" id="nav">
                <a href="index.html" class="active">Home</a>
                <a href="#">Features</a>
                <a href="#">Pricing</a>
                <a href="#">Docs</a>
                <a href="choose.html" class="nav-cta">Get Started</a>
            </nav>

            <!-- Hamburger -->
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </div>
    </header>

    <!-- ===== PAGE CONTENT ===== -->
    <main class="page-content">
        
        <!-- ===== ENTRY LOGO SECTION ===== -->
        <section class="entry-logo-section">
            <div class="container">
                <!-- Load logo.html here -->
                <div id="entry-logo-container"></div>
            </div>
        </section>

        <!-- ===== HERO SECTION ===== -->
        <section class="hero">
            <h1 class="fade-in-up">
                Welcome to <span class="highlight">Alpha</span>
            </h1>
            <p class="fade-in-up delay-1">
                The ultimate developer platform built for speed, security,
                and scalability. <br />Venom-inspired design, symbiote-grade performance.
            </p>
            <div class="hero-buttons fade-in-up delay-2">
                <a href="choose.html" class="btn-primary">
                    <i class="fas fa-rocket"></i> Start Building
                </a>
                <a href="#" class="btn-secondary">
                    <i class="fas fa-book"></i> Read Docs
                </a>
            </div>

            <!-- Stats -->
            <div class="stats fade-in-up delay-3">
                <div class="stat-item">
                    <div class="stat-number">10K+</div>
                    <div class="stat-label">Developers</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">5K+</div>
                    <div class="stat-label">Apps Deployed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">99.9%</div>
                    <div class="stat-label">Uptime</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">4.9⭐</div>
                    <div class="stat-label">User Rating</div>
                </div>
            </div>
        </section>
    </main>

    <!-- ===== JAVASCRIPT (all in main.js and all.js) ===== -->
    <script type="module" src="main.js"></script>
</body>
</html>
