
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <img src="logo.png" alt="Platform Logo" height="40">
                <span>DevPlatform</span>
            </a>
            <ul class="nav-links">
                <li><a href="users.html" data-auth>Dashboard</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="profile.html" class="active">Profile</a></li>
                <li><a href="settings.html">Settings</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
                <li>
                    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">
                        🌓
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding:30px 0;">
        <div class="card" style="padding:40px;max-width:800px;margin:0 auto;">
            <div style="display:flex;gap:30px;flex-wrap:wrap;">
                <div style="text-align:center;">
                    <img id="avatar" src="/assets/default-avatar.png" alt="Avatar" style="width:150px;height:150px;border-radius:50%;object-fit:cover;border:4px solid var(--primary);">
                    <button class="btn btn-sm btn-outline" style="margin-top:10px;" onclick="changeAvatar()">Change Avatar</button>
                </div>
                <div style="flex:1;">
                    <h1 id="username">Loading...</h1>
                    <p id="bio" style="color:var(--gray);">No bio yet</p>
                    <div style="display:flex;gap:20px;margin-top:20px;flex-wrap:wrap;">
                        <div>
                            <strong id="joined-date">-</strong>
                            <span style="color:var(--gray);font-size:0.9rem;">Joined</span>
                        </div>
                        <div>
                            <strong id="download-count">0</strong>
                            <span style="color:var(--gray);font-size:0.9rem;">Downloads</span>
                        </div>
                        <div>
                            <strong id="favorite-count">0</strong>
                            <span style="color:var(--gray);font-size:0.9rem;">Favorites</span>
                        </div>
                        <div>
                            <strong id="review-count">0</strong>
                            <span style="color:var(--gray);font-size:0.9rem;">Reviews</span>
                        </div>
                    </div>
                    <div style="margin-top:20px;">
                        <button class="btn btn-primary" onclick="editProfile()">Edit Profile</button>
                        <button class="btn btn-outline" onclick="viewActivity()">View Activity</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- User's Apps (if developer) -->
        <div style="margin-top:40px;" id="user-apps">
            <h2>Published Apps</h2>
            <div class="card-grid" id="published-apps">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <script type="module">
        import { showError, logout, toggleTheme } from './all.js';
        import api from './api.js';
        
        window.logout = logout;
        window.toggleTheme = toggleTheme;
        
        const loadProfile = async () => {
            try {
                const user = await api.auth.me();
                renderProfile(user);
            } catch (error) {
                showError('Failed to load profile');
            }
        };
        
        const renderProfile = (user) => {
            document.getElementById('username').textContent = user.username;
            document.getElementById('bio').textContent = user.bio || 'No bio yet';
            document.getElementById('joined-date').textContent = new Date(user.createdAt).toLocaleDateString();
            document.getElementById('download-count').textContent = user.downloadCount || 0;
            document.getElementById('favorite-count').textContent = user.favoriteCount || 0;
            document.getElementById('review-count').textContent = user.reviewCount || 0;
            
            if (user.avatar) {
                document.getElementById('avatar').src = user.avatar;
            }
            
            if (user.isDeveloper) {
                loadPublishedApps(user._id);
            } else {
                document.getElementById('user-apps').style.display = 'none';
            }
        };
        
        const loadPublishedApps = async (userId) => {
            try {
                const apps = await api.public.getApps({ developer: userId });
                const container = document.getElementById('published-apps');
                
                if (apps.length === 0) {
                    container.innerHTML = '<p style="color:var(--gray);">No published apps yet</p>';
                    return;
                }
                
                container.innerHTML = apps.map(app => `
                    <div class="app-card" onclick="window.location.href='app.html?id=${app._id}'">
                        <img src="${app.icon || '/assets/default-app-icon.png'}" alt="${app.name}" class="app-card-image">
                        <div class="app-card-content">
                            <h3 class="app-card-title">${app.name}</h3>
                            <p class="app-card-developer">${app.developerName}</p>
                            <div class="app-card-rating">⭐ ${app.rating || 'N/A'}</div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load published apps:', error);
            }
        };
        
        window.editProfile = () => {
            window.location.href = 'settings.html';
        };
        
        window.viewActivity = () => {
            alert('Activity log coming soon');
        };
        
        window.changeAvatar = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const formData = new FormData();
                formData.append('avatar', file);
                
                try {
                    await api.user.updateAvatar(formData);
                    alert('Avatar updated successfully!');
                    loadProfile();
                } catch (error) {
                    showError('Failed to update avatar');
                }
            };
            input.click();
        };
        
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
                          </html>
