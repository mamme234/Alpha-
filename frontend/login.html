<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="container" style="max-width:400px;margin:80px auto;">
        <div style="text-align:center;margin-bottom:40px;">
            <a href="index.html">
                <img src="logo.png" alt="Platform Logo" height="50" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>'">
            </a>
            <h1 style="margin-top:20px;">Welcome Back</h1>
            <p style="color:var(--gray);">Sign in to your account</p>
        </div>

        <div class="card" style="padding:40px;">
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    <div style="text-align:right;margin-top:5px;">
                        <a href="#" onclick="showForgotPassword()" style="font-size:0.85rem;color:var(--primary);">Forgot password?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1.1rem;" id="login-btn">
                    Sign In
                </button>
            </form>

            <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--light-gray);">
                <p>Don't have an account? <a href="signup.html" style="color:var(--primary);font-weight:600;">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { login, showError, showSuccess } from './all.js';

        window.login = login;
        window.showError = showError;
        window.showSuccess = showSuccess;

        window.handleLogin = async (event) => {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Signing In...';
            
            try {
                await login(email, password);
            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Login failed. Please try again.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        };

        window.showForgotPassword = () => {
            const email = prompt('Enter your email address to reset your password:');
            if (email) {
                alert('Password reset link sent to your email');
            }
        };
    </script>
</body>
</html>
