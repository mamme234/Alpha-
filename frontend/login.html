<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Alpha Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="bg-gradient"></div>

    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="auth-logo-mark">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" stroke="#440000" stroke-width="5" opacity="0.2" />
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" />
                        <path class="logo-svg-crossbar" d="M 26 56 L 74 56" />
                        <path class="logo-svg-horn" d="M 50 4 L 34 -4 L 44 8" />
                        <path class="logo-svg-horn" d="M 50 4 L 66 -4 L 56 8" />
                        <ellipse class="logo-svg-eye logo-svg-eye-pulse" cx="50" cy="36" rx="7" ry="9" />
                        <polygon class="logo-svg-fang" points="34,56 28,70 40,58" />
                        <polygon class="logo-svg-fang" points="66,56 60,70 72,58" />
                        <circle class="logo-svg-dot" cx="8" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="92" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="50" cy="6" r="2.5" fill="rgba(255,0,0,0.2)" />
                    </svg>
                </div>
                <span class="auth-logo-text">Alpha</span>
                <span class="auth-logo-version">v3.0</span>
            </div>

            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to your account</p>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                    <div style="text-align:right;margin-top:5px;">
                        <a href="#" onclick="showForgotPassword()" class="auth-link">Forgot password?</a>
                    </div>
                </div>

                <button type="button" class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" class="auth-link-highlight">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // SIMPLE LOGIN FUNCTION - NO MODULES
        // ============================================================
        
        const API_URL = 'https://alpha-af1q.onrender.com/api';

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            
            if (!email || !password) {
                showNotification('Please enter both email and password', 'error');
                return;
            }
            
            // Disable button and show loading
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            
            try {
                console.log('📤 Logging in:', email);
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                console.log('📥 Login response:', data);
                
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }
                
                if (data.success && data.user) {
                    // Store user data
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Store token
                    if (data.token) {
                        localStorage.setItem('authToken', data.token);
                    }
                    
                    showNotification(`Welcome ${data.user.username}!`, 'success');
                    
                    // Redirect based on role
                    setTimeout(() => {
                        if (data.user.role === 'developer' || data.user.isDeveloper) {
                            window.location.href = 'developers.html';
                        } else {
                            window.location.href = 'users.html';
                        }
                    }, 500);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
                
            } catch (error) {
                console.error('❌ Login error:', error);
                showNotification(error.message || 'Login failed. Please check your credentials.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        }

        // ============================================================
        // NOTIFICATIONS
        // ============================================================
        
        function showNotification(message, type = 'info') {
            // Remove existing notifications
            const existingContainer = document.getElementById('notification-container');
            if (existingContainer) {
                existingContainer.remove();
            }
            
            const container = document.createElement('div');
            container.id = 'notification-container';
            container.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                gap: 8px;
                max-width: 380px;
                width: 100%;
            `;
            document.body.appendChild(container);
            
            const colors = {
                success: 'rgba(46, 204, 113, 0.95)',
                error: 'rgba(231, 76, 60, 0.95)',
                warning: 'rgba(243, 156, 18, 0.95)',
                info: 'rgba(52, 152, 219, 0.95)'
            };
            
            const notification = document.createElement('div');
            notification.style.cssText = `
                background: ${colors[type] || colors.info};
                color: white;
                padding: 12px 16px;
                border-radius: 10px;
                font-size: 13px;
                font-weight: 500;
                animation: slideInRight 0.3s ease;
                cursor: pointer;
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            `;
            notification.textContent = message;
            
            container.appendChild(notification);
            
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.style.animation = 'slideOutRight 0.3s ease';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.remove();
                            if (container.children.length === 0) {
                                container.remove();
                            }
                        }
                    }, 300);
                }
            }, 4000);
            
            notification.addEventListener('click', () => {
                if (notification.parentNode) {
                    notification.style.animation = 'slideOutRight 0.3s ease';
                    setTimeout(() => {
                        if (notification.parentNode) {
                            notification.remove();
                            if (container.children.length === 0) {
                                container.remove();
                            }
                        }
                    }, 300);
                }
            });
        }

        function showForgotPassword() {
            const email = prompt('Enter your email address to reset your password:');
            if (email) {
                showNotification('Password reset link sent to your email', 'success');
            }
        }

        // Enter key support
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleLogin();
                }
            });
            document.getElementById('email').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('password').focus();
                }
            });
        });
    </script>

    <style>
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</body>
    </html>
