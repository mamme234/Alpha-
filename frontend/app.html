<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Details - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <img src="logo.png" alt="Platform Logo" height="40">
                <span>DevPlatform</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="users.html" data-auth>Dashboard</a></li>
                <li><a href="#" onclick="logout()" data-auth>Logout</a></li>
                <li><a href="login.html" data-guest>Login</a></li>
                <li>
                    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">
                        🌓
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding:30px 0;">
        <div id="app-details">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Loading app details...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { getUrlParams, showError, logout, toggleTheme } from './all.js';
        import api from './api.js';
        
        window.logout = logout;
        window.toggleTheme = toggleTheme;
        
        const loadAppDetails = async () => {
            const params = getUrlParams();
            const appId = params.id;
            
            if (!appId) {
                window.location.href = 'search.html';
                return;
            }
            
            try {
                const app = await api.public.getApp(appId);
                renderAppDetails(app);
            } catch (error) {
                showError('Failed to load app details');
                document.getElementById('app-details').innerHTML = `
                    <div class="alert alert-danger">
                        <h3>Error Loading App</h3>
                        <p>${error.message}</p>
                        <a href="search.html" class="btn btn-primary">Back to Search</a>
                    </div>
                `;
            }
        };
        
        const renderAppDetails = (app) => {
            const container = document.getElementById('app-details');
            
            container.innerHTML = `
                <div style="display:grid;grid-template-columns:1fr 2fr;gap:30px;">
                    <!-- Left Column -->
                    <div>
                        <img src="${app.icon || '/assets/default-app-icon.png'}" alt="${app.name}" style="width:100%;border-radius:12px;">
                        <div style="margin-top:20px;">
                            <h1>${app.name}</h1>
                            <p style="color:var(--gray);">by ${app.developerName}</p>
                            <div style="display:flex;gap:20px;margin:15px 0;">
                                <span>⭐ ${app.rating || 'N/A'} (${app.totalReviews || 0} reviews)</span>
                                <span>📥 ${app.downloads || 0} downloads</span>
                            </div>
                            <div style="display:flex;gap:10px;flex-wrap:wrap;margin:20px 0;">
                                <button class="btn btn-primary" onclick="downloadApp('${app._id}')">📥 Download</button>
                                <button class="btn btn-outline" onclick="toggleFavorite('${app._id}')">❤️ Favorite</button>
                                <button class="btn btn-secondary" onclick="shareApp('${app._id}')">🔗 Share</button>
                            </div>
                            <div style="background:var(--lighter);padding:20px;border-radius:8px;">
                                <h3>Version ${app.version || '1.0.0'}</h3>
                                <p>Size: ${app.size || 'N/A'}</p>
                                <p>Category: ${app.category || 'Uncategorized'}</p>
                                <p>License: ${app.license || 'Proprietary'}</p>
                                <p>Updated: ${app.lastUpdate ? new Date(app.lastUpdate).toLocaleDateString() : 'N/A'}</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right Column -->
                    <div>
                        <h2>About This App</h2>
                        <p style="margin:15px 0;">${app.description || 'No description provided'}</p>
                        
                        <h3 style="margin-top:30px;">Features</h3>
                        <ul>
                            ${(app.features || ['No features listed']).map(f => `<li>${f}</li>`).join('')}
                        </ul>
                        
                        <h3 style="margin-top:30px;">Screenshots</h3>
                        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;">
                            ${(app.screenshots || []).map(img => `
                                <img src="${img}" style="width:100%;border-radius:8px;cursor:pointer;" onclick="window.open('${img}')">
                            `).join('')}
                        </div>
                        
                        <h3 style="margin-top:30px;">Reviews</h3>
                        <div id="reviews-section">
                            <!-- Reviews loaded dynamically -->
                        </div>
                        
                        <h3 style="margin-top:30px;">Write a Review</h3>
                        <form id="review-form" onsubmit="submitReview(event, '${app._id}')">
                            <div class="form-group">
                                <label class="form-label">Rating</label>
                                <select class="form-control" id="rating" required>
                                    <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                                    <option value="4">⭐⭐⭐⭐ - Good</option>
                                    <option value="3">⭐⭐⭐ - Average</option>
                                    <option value="2">⭐⭐ - Poor</option>
                                    <option value="1">⭐ - Terrible</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Title</label>
                                <input type="text" id="review-title" class="form-control" placeholder="Review title">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Content</label>
                                <textarea id="review-content" class="form-control" rows="4" placeholder="Share your experience..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit Review</button>
                        </form>
                    </div>
                </div>
            `;
            
            // Load reviews
            loadReviews(app._id);
        };
        
        const loadReviews = async (appId) => {
            try {
                const reviews = await api.public.getAppReviews(appId);
                const container = document.getElementById('reviews-section');
                
                if (reviews.length === 0) {
                    container.innerHTML = '<p style="color:var(--gray);">No reviews yet. Be the first!</p>';
                    return;
                }
                
                container.innerHTML = reviews.map(review => `
                    <div class="card" style="margin-bottom:15px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <strong>${review.userName}</strong>
                                <span style="color:var(--gray);">• ${review.rating}⭐</span>
                            </div>
                            <span style="color:var(--gray);font-size:0.85rem;">${new Date(review.createdAt).toLocaleDateString()}</span>
                        </div>
                        <h4 style="margin:10px 0;">${review.title}</h4>
                        <p>${review.content}</p>
                        <button class="btn btn-sm btn-outline" onclick="likeReview('${review._id}')">👍 ${review.helpfulCount || 0}</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load reviews:', error);
            }
        };
        
        window.submitReview = async (event, appId) => {
            event.preventDefault();
            
            const rating = parseInt(document.getElementById('rating').value);
            const title = document.getElementById('review-title').value;
            const content = document.getElementById('review-content').value;
            
            try {
                await api.user.writeReview(appId, { rating, title, content });
                alert('Review submitted successfully!');
                document.getElementById('review-form').reset();
                loadReviews(appId);
            } catch (error) {
                alert('Failed to submit review: ' + error.message);
            }
        };
        
        window.shareApp = (appId) => {
            const url = `${window.location.origin}/app.html?id=${appId}`;
            if (navigator.share) {
                navigator.share({
                    title: 'Check out this app!',
                    url: url
                });
            } else {
                navigator.clipboard.writeText(url);
                alert('Link copied to clipboard!');
            }
        };
        
        document.addEventListener('DOMContentLoaded', loadAppDetails);
    </script>
</body>
</html>
