<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Dashboard - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <img src="logo.png" alt="Platform Logo" height="40">
                <span>DevPlatform</span>
            </a>
            <ul class="nav-links">
                <li><a href="developers.html" class="active">Dashboard</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="editor.html">Editor</a></li>
                <li><a href="publish.html">Publish</a></li>
                <li><a href="analytics.html">Analytics</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
                <li>
                    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">
                        🌓
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding:30px 0;">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px;margin-bottom:30px;">
            <div>
                <h1>Developer Dashboard</h1>
                <p style="color:var(--gray);">Manage your projects, deployments, and apps</p>
            </div>
            <div>
                <button class="btn btn-primary" onclick="navigateTo('editor', { new: true })">
                    ➕ New Project
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="dashboard-stats" id="dev-stats">
            <!-- Loaded dynamically -->
        </div>

        <!-- Quick Actions -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin:30px 0;">
            <button class="btn btn-primary" onclick="navigateTo('editor', { new: true })">📝 New Project</button>
            <button class="btn btn-success" onclick="navigateTo('publish')">📱 Publish App</button>
            <button class="btn btn-secondary" onclick="navigateTo('deploy')">🚀 Deploy</button>
            <button class="btn btn-outline" onclick="navigateTo('analytics')">📊 Analytics</button>
        </div>

        <!-- Projects -->
        <section style="margin-top:40px;">
            <h2>📁 Your Projects</h2>
            <div id="dev-projects">
                <!-- Loaded dynamically -->
            </div>
        </section>

        <!-- Recent Deployments -->
        <section style="margin-top:40px;">
            <h2>🚀 Recent Deployments</h2>
            <div class="table-container" id="recent-deployments">
                <!-- Loaded dynamically -->
            </div>
        </section>

        <!-- Published Apps -->
        <section style="margin-top:40px;">
            <h2>📱 Published Apps</h2>
            <div class="card-grid" id="published-apps">
                <!-- Loaded dynamically -->
            </div>
        </section>
    </div>

    <script type="module">
        import { loadDeveloperDashboard, navigateTo, logout, toggleTheme } from './all.js';
        
        window.navigateTo = navigateTo;
        window.logout = logout;
        window.toggleTheme = toggleTheme;
        
        document.addEventListener('DOMContentLoaded', loadDeveloperDashboard);
    </script>
</body>
</html>
