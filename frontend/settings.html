<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="navbar-brand">
                <img src="logo.png" alt="Platform Logo" height="40">
                <span>DevPlatform</span>
            </a>
            <ul class="nav-links">
                <li><a href="users.html" data-auth>Dashboard</a></li>
                <li><a href="search.html">Search</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="settings.html" class="active">Settings</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
                <li>
                    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">
                        🌓
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding:30px 0;">
        <h1>Settings</h1>
        <p style="color:var(--gray);">Manage your account preferences</p>

        <div style="display:grid;grid-template-columns:250px 1fr;gap:30px;margin-top:30px;">
            <!-- Sidebar -->
            <div style="display:flex;flex-direction:column;gap:10px;">
                <button class="btn btn-outline" onclick="showSettingsTab('profile')" id="tab-profile" style="text-align:left;justify-content:flex-start;">
                    👤 Profile
                </button>
                <button class="btn btn-outline" onclick="showSettingsTab('security')" id="tab-security" style="text-align:left;justify-content:flex-start;">
                    🔒 Security
                </button>
                <button class="btn btn-outline" onclick="showSettingsTab('notifications')" id="tab-notifications" style="text-align:left;justify-content:flex-start;">
                    🔔 Notifications
                </button>
                <button class="btn btn-outline" onclick="showSettingsTab('appearance')" id="tab-appearance" style="text-align:left;justify-content:flex-start;">
                    🎨 Appearance
                </button>
                <button class="btn btn-outline" onclick="showSettingsTab('privacy')" id="tab-privacy" style="text-align:left;justify-content:flex-start;">
                    🔐 Privacy
                </button>
                <button class="btn btn-outline" onclick="showSettingsTab('billing')" id="tab-billing" style="text-align:left;justify-content:flex-start;" data-developer>
                    💳 Billing
                </button>
                <button class="btn btn-danger" onclick="deleteAccount()" style="text-align:left;justify-content:flex-start;margin-top:20px;">
                    🗑️ Delete Account
                </button>
            </div>

            <!-- Content -->
            <div class="card" style="padding:30px;" id="settings-content">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <script type="module">
        import { showSuccess, showError, logout, toggleTheme, openModal, closeModal } from './all.js';
        import api from './api.js';

        window.logout = logout;
        window.toggleTheme = toggleTheme;

        let currentUser = null;

        const loadUser = async () => {
            try {
                currentUser = await api.auth.me();
                showSettingsTab('profile');
            } catch (error) {
                showError('Failed to load user data');
            }
        };

        window.showSettingsTab = (tab) => {
            // Update active tab
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.className = 'btn btn-outline';
                el.style.textAlign = 'left';
                el.style.justifyContent = 'flex-start';
            });
            document.getElementById(`tab-${tab}`).className = 'btn btn-primary';
            document.getElementById(`tab-${tab}`).style.textAlign = 'left';
            document.getElementById(`tab-${tab}`).style.justifyContent = 'flex-start';

            // Show content
            const container = document.getElementById('settings-content');
            
            switch(tab) {
                case 'profile':
                    renderProfileSettings(container);
                    break;
                case 'security':
                    renderSecuritySettings(container);
                    break;
                case 'notifications':
                    renderNotificationSettings(container);
                    break;
                case 'appearance':
                    renderAppearanceSettings(container);
                    break;
                case 'privacy':
                    renderPrivacySettings(container);
                    break;
                case 'billing':
                    renderBillingSettings(container);
                    break;
                default:
                    container.innerHTML = '<p>Settings not found</p>';
            }
        };

        const renderProfileSettings = (container) => {
            container.innerHTML = `
                <h2>Profile Settings</h2>
                <form id="profile-form" onsubmit="updateProfile(event)">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input type="text" id="settings-username" class="form-control" value="${currentUser?.username || ''}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bio</label>
                        <textarea id="settings-bio" class="form-control" rows="4">${currentUser?.bio || ''}</textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Website</label>
                        <input type="url" id="settings-website" class="form-control" value="${currentUser?.website || ''}" placeholder="https://yourwebsite.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Location</label>
                        <input type="text" id="settings-location" class="form-control" value="${currentUser?.location || ''}" placeholder="City, Country">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            `;
        };

        const renderSecuritySettings = (container) => {
            container.innerHTML = `
                <h2>Security Settings</h2>
                
                <h3 style="margin-top:30px;">Change Password</h3>
                <form id="password-form" onsubmit="changePassword(event)">
                    <div class="form-group">
                        <label class="form-label">Current Password</label>
                        <input type="password" id="current-password" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" id="new-password" class="form-control" required minlength="8">
                        <div class="form-text">Must be at least 8 characters with letters and numbers</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirm-password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Change Password</button>
                </form>

                <h3 style="margin-top:40px;">Two-Factor Authentication</h3>
                <div style="background:var(--lighter);padding:20px;border-radius:8px;">
                    <p>${currentUser?.twoFactorEnabled ? '✅ Two-factor authentication is enabled' : '❌ Two-factor authentication is disabled'}</p>
                    <button class="btn ${currentUser?.twoFactorEnabled ? 'btn-danger' : 'btn-primary'}" onclick="toggle2FA()">
                        ${currentUser?.twoFactorEnabled ? 'Disable 2FA' : 'Enable 2FA'}
                    </button>
                </div>

                <h3 style="margin-top:40px;">Sessions</h3>
                <div id="active-sessions">
                    <p style="color:var(--gray);">Loading sessions...</p>
                </div>
            `;
            
            loadActiveSessions();
        };

        const renderNotificationSettings = (container) => {
            container.innerHTML = `
                <h2>Notification Preferences</h2>
                <form id="notification-form" onsubmit="updateNotificationSettings(event)">
                    <div class="form-check">
                        <input type="checkbox" id="notify-email" ${currentUser?.notifications?.email !== false ? 'checked' : ''}>
                        <label for="notify-email">Email Notifications</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="notify-push" ${currentUser?.notifications?.push !== false ? 'checked' : ''}>
                        <label for="notify-push">Push Notifications</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="notify-deployments" ${currentUser?.notifications?.deployments !== false ? 'checked' : ''}>
                        <label for="notify-deployments">Deployment Updates</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="notify-reviews" ${currentUser?.notifications?.reviews !== false ? 'checked' : ''}>
                        <label for="notify-reviews">New Reviews</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="notify-updates" ${currentUser?.notifications?.updates !== false ? 'checked' : ''}>
                        <label for="notify-updates">App Updates</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="notify-security" ${currentUser?.notifications?.security !== false ? 'checked' : ''}>
                        <label for="notify-security">Security Alerts</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Preferences</button>
                </form>
            `;
        };

        const renderAppearanceSettings = (container) => {
            container.innerHTML = `
                <h2>Appearance Settings</h2>
                <div class="form-group">
                    <label class="form-label">Theme</label>
                    <select id="theme-select" class="form-control" onchange="changeTheme(this.value)">
                        <option value="light" ${localStorage.getItem('theme') === 'light' ? 'selected' : ''}>🌞 Light</option>
                        <option value="dark" ${localStorage.getItem('theme') === 'dark' ? 'selected' : ''}>🌙 Dark</option>
                        <option value="system" ${localStorage.getItem('theme') === 'system' ? 'selected' : ''}>🖥️ System</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Language</label>
                    <select id="language-select" class="form-control" onchange="changeLanguage(this.value)">
                        <option value="en">🇺🇸 English</option>
                        <option value="es">🇪🇸 Español</option>
                        <option value="fr">🇫🇷 Français</option>
                        <option value="de">🇩🇪 Deutsch</option>
                        <option value="zh">🇨🇳 中文</option>
                        <option value="ja">🇯🇵 日本語</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Font Size</label>
                    <select id="font-size" class="form-control" onchange="changeFontSize(this.value)">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>
            `;
        };

        const renderPrivacySettings = (container) => {
            container.innerHTML = `
                <h2>Privacy Settings</h2>
                <form id="privacy-form" onsubmit="updatePrivacySettings(event)">
                    <div class="form-check">
                        <input type="checkbox" id="profile-public" ${currentUser?.privacy?.profilePublic !== false ? 'checked' : ''}>
                        <label for="profile-public">Make profile public</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="show-email" ${currentUser?.privacy?.showEmail !== false ? 'checked' : ''}>
                        <label for="show-email">Show email on profile</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="show-activity" ${currentUser?.privacy?.showActivity !== false ? 'checked' : ''}>
                        <label for="show-activity">Show activity status</label>
                    </div>
                    <div class="form-check">
                        <input type="checkbox" id="allow-analytics" ${currentUser?.privacy?.allowAnalytics !== false ? 'checked' : ''}>
                        <label for="allow-analytics">Allow analytics tracking</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Privacy Settings</button>
                </form>

                <h3 style="margin-top:40px;">Data Export</h3>
                <button class="btn btn-outline" onclick="exportData()">📥 Download My Data</button>
            `;
        };

        const renderBillingSettings = (container) => {
            container.innerHTML = `
                <h2>Billing & Subscription</h2>
                <div style="background:var(--lighter);padding:20px;border-radius:8px;margin-bottom:20px;">
                    <h3>Current Plan: <span style="color:var(--primary);">${currentUser?.plan || 'Free'}</span></h3>
                    <p style="color:var(--gray);">${currentUser?.plan === 'Free' ? 'Upgrade to Pro for more features' : 'You are on the Pro plan'}</p>
                </div>

                <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin:30px 0;">
                    <div class="card" style="text-align:center;padding:30px;">
                        <h3>Free</h3>
                        <p style="font-size:2rem;font-weight:700;">$0</p>
                        <p style="color:var(--gray);">/month</p>
                        <ul style="text-align:left;list-style:none;padding:0;margin:20px 0;">
                            <li>✅ 1 Project</li>
                            <li>✅ 1 Deployment</li>
                            <li>✅ 100MB Storage</li>
                            <li>✅ Community Support</li>
                        </ul>
                        ${currentUser?.plan === 'Free' ? '<button class="btn btn-primary" disabled>Current Plan</button>' : '<button class="btn btn-outline" onclick="changePlan(\'free\')">Downgrade</button>'}
                    </div>
                    <div class="card" style="text-align:center;padding:30px;border:2px solid var(--primary);">
                        <span style="background:var(--primary);color:white;padding:2px 12px;border-radius:20px;font-size:0.85rem;">Popular</span>
                        <h3>Pro</h3>
                        <p style="font-size:2rem;font-weight:700;">$29</p>
                        <p style="color:var(--gray);">/month</p>
                        <ul style="text-align:left;list-style:none;padding:0;margin:20px 0;">
                            <li>✅ Unlimited Projects</li>
                            <li>✅ Unlimited Deployments</li>
                            <li>✅ 10GB Storage</li>
                            <li>✅ Priority Support</li>
                            <li>✅ Custom Domain</li>
                            <li>✅ Team Collaboration</li>
                        </ul>
                        ${currentUser?.plan === 'Pro' ? '<button class="btn btn-primary" disabled>Current Plan</button>' : '<button class="btn btn-primary" onclick="changePlan(\'pro\')">Upgrade</button>'}
                    </div>
                    <div class="card" style="text-align:center;padding:30px;">
                        <h3>Enterprise</h3>
                        <p style="font-size:2rem;font-weight:700;">$99</p>
                        <p style="color:var(--gray);">/month</p>
                        <ul style="text-align:left;list-style:none;padding:0;margin:20px 0;">
                            <li>✅ Everything in Pro</li>
                            <li>✅ 100GB Storage</li>
                            <li>✅ Dedicated Support</li>
                            <li>✅ SLA Guarantee</li>
                            <li>✅ SSO Integration</li>
                            <li>✅ Custom Branding</li>
                        </ul>
                        ${currentUser?.plan === 'Enterprise' ? '<button class="btn btn-primary" disabled>Current Plan</button>' : '<button class="btn btn-outline" onclick="changePlan(\'enterprise\')">Contact Sales</button>'}
                    </div>
                </div>

                <h3 style="margin-top:30px;">Payment Methods</h3>
                <div id="payment-methods">
                    <p style="color:var(--gray);">No payment methods added</p>
                    <button class="btn btn-outline" onclick="addPaymentMethod()">➕ Add Payment Method</button>
                </div>

                <h3 style="margin-top:30px;">Billing History</h3>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="4" style="text-align:center;color:var(--gray);">No billing history</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            `;
        };

        // ==================== Action Functions ====================

        window.updateProfile = async (event) => {
            event.preventDefault();
            const username = document.getElementById('settings-username').value;
            const bio = document.getElementById('settings-bio').value;
            const website = document.getElementById('settings-website').value;
            const location = document.getElementById('settings-location').value;

            try {
                await api.user.updateProfile({ username, bio, website, location });
                showSuccess('Profile updated successfully!');
                currentUser = await api.auth.me();
            } catch (error) {
                showError('Failed to update profile: ' + error.message);
            }
        };

        window.changePassword = async (event) => {
            event.preventDefault();
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            try {
                await api.auth.changePassword({ currentPassword, newPassword });
                showSuccess('Password changed successfully!');
                document.getElementById('password-form').reset();
            } catch (error) {
                showError('Failed to change password: ' + error.message);
            }
        };

        window.toggle2FA = async () => {
            try {
                const result = await api.auth.toggle2FA();
                if (result.enabled) {
                    showSuccess('2FA enabled successfully!');
                    // Show backup codes
                    if (result.backupCodes) {
                        const modal = openModal(`
                            <h3>Save Your Backup Codes</h3>
                            <p>Store these codes in a safe place. Each code can only be used once.</p>
                            <div style="background:var(--dark);color:white;padding:20px;border-radius:8px;font-family:monospace;margin:20px 0;">
                                ${result.backupCodes.map(code => `<div>${code}</div>`).join('')}
                            </div>
                            <button class="btn btn-primary" onclick="closeModal(this.closest('.modal-overlay'))">I've Saved Them</button>
                        `, '2FA Setup Complete');
                    }
                } else {
                    showInfo('2FA disabled');
                }
                loadUser();
            } catch (error) {
                showError('Failed to toggle 2FA: ' + error.message);
            }
        };

        const loadActiveSessions = async () => {
            try {
                const sessions = await api.auth.getSessions();
                const container = document.getElementById('active-sessions');
                
                if (sessions.length === 0) {
                    container.innerHTML = '<p style="color:var(--gray);">No active sessions</p>';
                    return;
                }

                container.innerHTML = sessions.map(session => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--light-gray);">
                        <div>
                            <strong>${session.device || 'Unknown Device'}</strong>
                            <p style="font-size:0.85rem;color:var(--gray);">
                                ${session.location || 'Unknown Location'} • 
                                Last active: ${new Date(session.lastActive).toLocaleDateString()}
                            </p>
                        </div>
                        <div>
                            ${session.current ? '<span style="color:var(--success);">● Current</span>' : ''}
                            <button class="btn btn-sm btn-danger" onclick="revokeSession('${session.id}')">Revoke</button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load sessions:', error);
            }
        };

        window.revokeSession = async (sessionId) => {
            if (!confirm('Revoke this session?')) return;
            try {
                await api.auth.revokeSession(sessionId);
                showSuccess('Session revoked');
                loadActiveSessions();
            } catch (error) {
                showError('Failed to revoke session');
            }
        };

        window.updateNotificationSettings = async (event) => {
            event.preventDefault();
            const settings = {
                email: document.getElementById('notify-email').checked,
                push: document.getElementById('notify-push').checked,
                deployments: document.getElementById('notify-deployments').checked,
                reviews: document.getElementById('notify-reviews').checked,
                updates: document.getElementById('notify-updates').checked,
                security: document.getElementById('notify-security').checked,
            };

            try {
                await api.user.updateNotificationSettings(settings);
                showSuccess('Notification preferences saved!');
            } catch (error) {
                showError('Failed to save preferences: ' + error.message);
            }
        };

        window.changeTheme = (theme) => {
            localStorage.setItem('theme', theme);
            if (theme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            showSuccess('Theme updated!');
        };

        window.changeLanguage = (lang) => {
            localStorage.setItem('language', lang);
            showSuccess('Language updated!');
            // Reload to apply language changes
            setTimeout(() => window.location.reload(), 1000);
        };

        window.changeFontSize = (size) => {
            const sizes = { small: '14px', medium: '16px', large: '18px' };
            document.documentElement.style.fontSize = sizes[size];
            localStorage.setItem('fontSize', size);
            showSuccess('Font size updated!');
        };

        window.updatePrivacySettings = async (event) => {
            event.preventDefault();
            const settings = {
                profilePublic: document.getElementById('profile-public').checked,
                showEmail: document.getElementById('show-email').checked,
                showActivity: document.getElementById('show-activity').checked,
                allowAnalytics: document.getElementById('allow-analytics').checked,
            };

            try {
                await api.user.updatePrivacySettings(settings);
                showSuccess('Privacy settings saved!');
            } catch (error) {
                showError('Failed to save privacy settings: ' + error.message);
            }
        };

        window.exportData = async () => {
            try {
                const data = await api.user.exportData();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'user-data.json';
                a.click();
                URL.revokeObjectURL(url);
                showSuccess('Data exported successfully!');
            } catch (error) {
                showError('Failed to export data: ' + error.message);
            }
        };

        window.changePlan = async (plan) => {
            if (!confirm(`Change to ${plan} plan?`)) return;
            try {
                await api.billing.changePlan(plan);
                showSuccess(`Plan changed to ${plan}!`);
                loadUser();
            } catch (error) {
                showError('Failed to change plan: ' + error.message);
            }
        };

        window.addPaymentMethod = () => {
            // Implementation for payment method addition
            alert('Payment method addition will be implemented with Stripe/PayPal');
        };

        window.deleteAccount = async () => {
            if (!confirm('Are you sure you want to delete your account? This action cannot be undone!')) return;
            const password = prompt('Enter your password to confirm:');
            if (!password) return;

            try {
                await api.auth.deleteAccount({ password });
                showSuccess('Account deleted successfully');
                setTimeout(() => window.location.href = '/index.html', 2000);
            } catch (error) {
                showError('Failed to delete account: ' + error.message);
            }
        };

        // Check developer features
        document.addEventListener('DOMContentLoaded', async () => {
            await loadUser();
            
            // Show/hide developer settings
            const user = await api.auth.me();
            if (!user.isDeveloper) {
                document.querySelectorAll('[data-developer]').forEach(el => {
                    el.style.display = 'none';
                });
            }
        });
    </script>
</body>
  </html>
