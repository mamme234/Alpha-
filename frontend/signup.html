<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — Alpha Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="symbiote-particle"></div>
    <div class="symbiote-particle"></div>
    <div class="glitch-line"></div>
    <div class="glitch-line"></div>

    <div class="auth-page">
        <div class="auth-container" style="max-width:500px;">
            <div class="auth-logo">
                <div class="auth-logo-mark">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" stroke="#440000" stroke-width="5" opacity="0.2" />
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" />
                        <path class="logo-svg-crossbar" d="M 26 56 L 74 56" />
                        <path class="logo-svg-horn" d="M 50 4 L 34 -4 L 44 8" />
                        <path class="logo-svg-horn" d="M 50 4 L 66 -4 L 56 8" />
                        <ellipse class="logo-svg-eye logo-svg-eye-pulse" cx="50" cy="36" rx="7" ry="9" />
                        <polygon class="logo-svg-fang" points="34,56 28,70 40,58" />
                        <polygon class="logo-svg-fang" points="66,56 60,70 72,58" />
                        <circle class="logo-svg-dot" cx="8" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="92" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="50" cy="6" r="2.5" fill="rgba(255,0,0,0.2)" />
                    </svg>
                </div>
                <span class="auth-logo-text">Alpha</span>
                <span class="auth-logo-version">v3.0</span>
            </div>

            <h1 class="auth-title">Create Your Account</h1>
            <p class="auth-subtitle">Join the developer ecosystem</p>

            <form id="signup-form" onsubmit="handleSignup(event)" class="auth-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+">
                    <div class="form-text">Must be 3-30 characters, alphanumeric only</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required minlength="8">
                    <div class="form-text">Must be at least 8 characters with letters and numbers</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <div class="role-selector">
                        <button type="button" class="role-btn active" id="role-user" onclick="selectRole('user')">
                            <i class="fas fa-user"></i>
                            <span>User</span>
                            <small>Discover & use apps</small>
                        </button>
                        <button type="button" class="role-btn" id="role-developer" onclick="selectRole('developer')">
                            <i class="fas fa-code"></i>
                            <span>Developer</span>
                            <small>Build & publish apps</small>
                        </button>
                    </div>
                    <input type="hidden" id="role" value="user">
                </div>

                <div class="form-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="terms.html" class="auth-link-highlight">Terms of Service</a> and 
                        <a href="privacy.html" class="auth-link-highlight">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="auth-link-highlight">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { register, showError, showSuccess } from './all.js';

        window.register = register;
        window.showError = showError;
        window.showSuccess = showSuccess;

        let selectedRole = 'user';

        window.selectRole = (role) => {
            selectedRole = role;
            document.getElementById('role').value = role;
            document.getElementById('role-user').className = `role-btn ${role === 'user' ? 'active' : ''}`;
            document.getElementById('role-developer').className = `role-btn ${role === 'developer' ? 'active' : ''}`;
        };

        window.handleSignup = async (event) => {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const role = document.getElementById('role').value;
            const terms = document.getElementById('terms').checked;
            
            if (!username || username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }
            
            if (!email || !email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }
            
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (!terms) {
                showError('Please agree to the Terms of Service');
                return;
            }
            
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            
            try {
                await register({ username, email, password, role: role || 'user' });
            } catch (error) {
                showError(error.message || 'Registration failed. Please try again.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            selectRole('user');
        });
    </script>
</body>
    </html>
