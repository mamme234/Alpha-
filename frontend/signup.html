<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="container" style="max-width:500px;margin:60px auto;">
        <div style="text-align:center;margin-bottom:30px;">
            <a href="index.html">
                <img src="logo.png" alt="Platform Logo" height="50" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>'">
            </a>
            <h1 style="margin-top:20px;">Create Your Account</h1>
            <p style="color:var(--gray);">Join the developer ecosystem</p>
        </div>

        <div class="card" style="padding:40px;">
            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+">
                    <div class="form-text">Must be 3-30 characters, alphanumeric only</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required minlength="8">
                    <div class="form-text">Must be at least 8 characters with letters and numbers</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5px;">
                        <button type="button" class="btn btn-primary" id="role-user" onclick="selectRole('user')" style="width:100%;">
                            👤 User
                            <br><small style="font-weight:normal;">Discover & use apps</small>
                        </button>
                        <button type="button" class="btn btn-outline" id="role-developer" onclick="selectRole('developer')" style="width:100%;">
                            👨‍💻 Developer
                            <br><small style="font-weight:normal;">Build & publish apps</small>
                        </button>
                    </div>
                    <input type="hidden" id="role" value="user">
                </div>

                <div class="form-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="terms.html" style="color:var(--primary);">Terms of Service</a> and 
                        <a href="privacy.html" style="color:var(--primary);">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1.1rem;margin-top:10px;" id="signup-btn">
                    Create Account
                </button>
            </form>

            <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--light-gray);">
                <p>Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { register, showError, showSuccess, navigateTo } from './all.js';

        // Make functions available globally
        window.register = register;
        window.showError = showError;
        window.showSuccess = showSuccess;
        window.navigateTo = navigateTo;

        let selectedRole = 'user';

        window.selectRole = (role) => {
            selectedRole = role;
            document.getElementById('role').value = role;
            
            const userBtn = document.getElementById('role-user');
            const devBtn = document.getElementById('role-developer');
            
            if (role === 'user') {
                userBtn.className = 'btn btn-primary';
                devBtn.className = 'btn btn-outline';
            } else {
                userBtn.className = 'btn btn-outline';
                devBtn.className = 'btn btn-primary';
            }
        };

        window.handleSignup = async (event) => {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const role = document.getElementById('role').value;
            const terms = document.getElementById('terms').checked;
            
            // Validate username
            if (!username || username.length < 3) {
                showError('Username must be at least 3 characters');
                return;
            }
            
            // Validate email
            if (!email || !email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Validate password
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            // Validate confirm password
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            // Validate terms
            if (!terms) {
                showError('Please agree to the Terms of Service and Privacy Policy');
                return;
            }
            
            // Disable button to prevent double submission
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating Account...';
            
            try {
                console.log('📤 Submitting registration for:', email);
                
                const result = await register({ 
                    username, 
                    email, 
                    password, 
                    role: role || 'user' 
                });
                
                console.log('✅ Registration successful:', result);
                
                showSuccess('Account created successfully! Please check your email to verify your account.');
                
                // Reset form
                document.getElementById('signup-form').reset();
                
                // Redirect to login after 3 seconds
                setTimeout(() => {
                    navigateTo('login');
                }, 3000);
                
            } catch (error) {
                console.error('❌ Registration error:', error);
                showError(error.message || 'Registration failed. Please try again.');
                
                // Re-enable button
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        };

        // Initialize role selection on page load
        document.addEventListener('DOMContentLoaded', () => {
            selectRole('user');
            
            // Add validation feedback
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirm-password');
            
            confirmInput.addEventListener('input', () => {
                if (passwordInput.value && confirmInput.value) {
                    if (passwordInput.value !== confirmInput.value) {
                        confirmInput.style.borderColor = '#e74c3c';
                    } else {
                        confirmInput.style.borderColor = '#2ecc71';
                    }
                }
            });
        });

        // Global error handler for unhandled promises
        window.addEventListener('unhandledrejection', (event) => {
            console.error('Unhandled rejection:', event.reason);
            showError('An unexpected error occurred. Please try again.');
        });
    </script>
</body>
        </html>
