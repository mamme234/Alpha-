<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Developer Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div class="container" style="max-width:500px;margin:60px auto;">
        <div style="text-align:center;margin-bottom:30px;">
            <a href="index.html">
                <img src="logo.png" alt="Platform Logo" height="50">
            </a>
            <h1 style="margin-top:20px;">Create Your Account</h1>
            <p style="color:var(--gray);">Join the developer ecosystem</p>
        </div>

        <div class="card" style="padding:40px;">
            <form id="signup-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Choose a username" required minlength="3" maxlength="30">
                    <div class="form-text">Must be 3-30 characters, alphanumeric only</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required minlength="8">
                    <div class="form-text">Must be at least 8 characters with letters and numbers</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Account Type</label>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:5px;">
                        <button type="button" class="btn btn-outline" id="role-user" onclick="selectRole('user')" style="width:100%;">
                            👤 User
                            <br><small style="font-weight:normal;">Discover & use apps</small>
                        </button>
                        <button type="button" class="btn btn-outline" id="role-developer" onclick="selectRole('developer')" style="width:100%;">
                            👨‍💻 Developer
                            <br><small style="font-weight:normal;">Build & publish apps</small>
                        </button>
                    </div>
                    <input type="hidden" id="role" value="user">
                </div>

                <div class="form-check">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="#" style="color:var(--primary);">Terms of Service</a> and 
                        <a href="#" style="color:var(--primary);">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1.1rem;">
                    Create Account
                </button>
            </form>

            <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--light-gray);">
                <p>Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;">Sign In</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { register } from './all.js';
        
        let selectedRole = 'user';
        
        window.selectRole = (role) => {
            selectedRole = role;
            document.getElementById('role').value = role;
            document.getElementById('role-user').className = `btn ${role === 'user' ? 'btn-primary' : 'btn-outline'}`;
            document.getElementById('role-developer').className = `btn ${role === 'developer' ? 'btn-primary' : 'btn-outline'}`;
        };
        
        window.handleSignup = async (event) => {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const role = document.getElementById('role').value;
            
            // Validate
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            if (!document.getElementById('terms').checked) {
                alert('Please agree to the terms of service');
                return;
            }
            
            try {
                await register({ username, email, password, role });
            } catch (error) {
                alert(error.message);
            }
        };
    </script>
</body>
</html>
