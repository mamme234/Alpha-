<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Editor — Alpha Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&family=Orbitron:wght@700;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        /* ============================================================
           EDITOR SPECIFIC STYLES
           ============================================================ */
        body {
            overflow: hidden;
            height: 100vh;
        }

        .editor-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: 70px;
            position: relative;
            z-index: 1;
        }

        /* ===== EDITOR TOOLBAR ===== */
        .editor-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 20px;
            background: rgba(20, 10, 10, 0.95);
            border-bottom: 1px solid rgba(255, 0, 0, 0.06);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .editor-toolbar .project-name {
            font-weight: 600;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-right: 16px;
        }

        .editor-toolbar .project-name i {
            color: #cc0000;
            margin-right: 8px;
        }

        .editor-toolbar .btn {
            padding: 4px 14px;
            font-size: 12px;
        }

        .editor-toolbar .status {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-toolbar .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .editor-toolbar .status .dot.saved {
            background: #2ecc71;
        }

        .editor-toolbar .status .dot.unsaved {
            background: #f39c12;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .editor-toolbar .status .file-path {
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
        }

        /* ===== EDITOR CONTAINER ===== */
        .editor-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .editor-sidebar {
            width: 260px;
            background: rgba(15, 8, 8, 0.95);
            border-right: 1px solid rgba(255, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .editor-sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 0, 0, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-sidebar-header h4 {
            font-family: 'Black Ops One', cursive;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
        }

        .editor-sidebar-header .btn {
            padding: 2px 10px;
            font-size: 10px;
        }

        .editor-sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* File Tree */
        .file-tree {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-tree li {
            padding: 4px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
            border-left: 2px solid transparent;
        }

        .file-tree li:hover {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.7);
        }

        .file-tree li.active {
            background: rgba(255, 0, 0, 0.06);
            border-left-color: #cc0000;
            color: #ffffff;
        }

        .file-tree li .icon {
            font-size: 14px;
            width: 20px;
            text-align: center;
        }

        .file-tree li .folder-icon {
            color: #f39c12;
        }

        .file-tree li .file-icon {
            color: rgba(255, 255, 255, 0.3);
        }

        .file-tree .folder-children {
            padding-left: 20px;
        }

        .file-tree .folder-toggle {
            cursor: pointer;
            margin-right: 4px;
        }

        /* ===== MAIN EDITOR ===== */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            overflow: hidden;
        }

        /* Tabs */
        .editor-tabs {
            display: flex;
            background: rgba(15, 8, 8, 0.95);
            border-bottom: 1px solid rgba(255, 0, 0, 0.06);
            overflow-x: auto;
            flex-shrink: 0;
            min-height: 36px;
        }

        .editor-tab {
            padding: 6px 16px;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-size: 12px;
            border-right: 1px solid rgba(255, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .editor-tab:hover {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.6);
        }

        .editor-tab.active {
            color: #ffffff;
            border-bottom-color: #cc0000;
            background: rgba(255, 0, 0, 0.04);
        }

        .editor-tab .tab-close {
            opacity: 0.3;
            transition: all 0.2s ease;
            font-size: 14px;
            cursor: pointer;
            margin-left: 4px;
        }

        .editor-tab .tab-close:hover {
            opacity: 1;
            color: #ff0000;
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #editor-container {
            width: 100%;
            height: 100%;
        }

        /* ===== TERMINAL ===== */
        .editor-terminal {
            height: 150px;
            background: rgba(10, 5, 5, 0.98);
            border-top: 1px solid rgba(255, 0, 0, 0.06);
            padding: 12px 16px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #00ff41;
            flex-shrink: 0;
        }

        .editor-terminal .terminal-line {
            padding: 2px 0;
            display: flex;
            gap: 8px;
        }

        .editor-terminal .terminal-prompt {
            color: #00ff41;
            opacity: 0.7;
        }

        .editor-terminal .terminal-output {
            color: rgba(255, 255, 255, 0.5);
        }

        .editor-terminal .terminal-error {
            color: #ff6b6b;
        }

        .editor-terminal .terminal-success {
            color: #2ecc71;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 768px) {
            .editor-sidebar {
                width: 200px;
            }

            .editor-toolbar {
                padding: 6px 12px;
                gap: 8px;
            }

            .editor-toolbar .project-name {
                font-size: 12px;
                margin-right: 8px;
            }

            .editor-toolbar .btn {
                padding: 3px 10px;
                font-size: 10px;
            }

            .editor-toolbar .status {
                font-size: 10px;
            }

            .editor-terminal {
                height: 100px;
                font-size: 11px;
            }
        }

        @media (max-width: 576px) {
            .editor-page {
                padding-top: 60px;
            }

            .editor-sidebar {
                width: 0;
                overflow: hidden;
                transition: width 0.3s ease;
            }

            .editor-sidebar.open {
                width: 240px;
                position: absolute;
                z-index: 10;
                height: calc(100vh - 70px);
                box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            }

            .editor-toolbar {
                flex-wrap: wrap;
            }

            .editor-toolbar .status {
                width: 100%;
                justify-content: flex-end;
            }

            .editor-tabs {
                min-height: 30px;
            }

            .editor-tab {
                padding: 4px 10px;
                font-size: 11px;
            }

            .editor-terminal {
                height: 80px;
                font-size: 10px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <!-- ===== HEADER ===== -->
    <header class="header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo-wrapper" id="logoLink">
                <div class="logo-mark">
                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" stroke="#440000" stroke-width="5" opacity="0.2" />
                        <path class="logo-svg-a" d="M 50 4 L 6 94 L 30 94 L 38 66 L 62 66 L 70 94 L 94 94 Z" />
                        <path class="logo-svg-crossbar" d="M 26 56 L 74 56" />
                        <path class="logo-svg-horn" d="M 50 4 L 34 -4 L 44 8" />
                        <path class="logo-svg-horn" d="M 50 4 L 66 -4 L 56 8" />
                        <ellipse class="logo-svg-eye logo-svg-eye-pulse" cx="50" cy="36" rx="7" ry="9" />
                        <polygon class="logo-svg-fang" points="34,56 28,70 40,58" />
                        <polygon class="logo-svg-fang" points="66,56 60,70 72,58" />
                        <circle class="logo-svg-dot" cx="8" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="92" cy="92" r="2.5" fill="rgba(255,0,0,0.15)" />
                        <circle class="logo-svg-dot" cx="50" cy="6" r="2.5" fill="rgba(255,0,0,0.2)" />
                    </svg>

            </a>

            <nav class="nav" id="nav">
                <a href="developers.html">Dashboard</a>

                <a href="deploy.html">Deploy</a>
                <a href="#" onclick="logout()">Logout</a>
            </nav>

            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span>

                <span></span>
            </button>

    </header>

    <!-- ===== EDITOR PAGE ===== -->
    <div class="editor-page">

        <!-- Toolbar -->
        <div class="editor-toolbar">
            <span class="project-name">
                <i class="fas fa-folder"></i>
                <span id="project-name">My Project</span>
            </span>

            <button class="btn btn-primary btn-sm" onclick="saveFile()">
                <i class="fas fa-save"></i> Save
            </button>
            <button class="btn btn-outline btn-sm" onclick="undoAction()">
                <i class="fas fa-undo"></i>
            </button>
            <button class="btn btn-outline btn-sm" onclick="redoAction()">
                <i class="fas fa-redo"></i>
            </button>
            <button class="btn btn-outline btn-sm" onclick="formatCode()">
                <i class="fas fa-magic"></i> Format
            </button>
            <button class="btn btn-success btn-sm" onclick="runCode()">
                <i class="fas fa-play"></i> Run
            </button>

            <span class="status">
                <span class="dot saved" id="status-dot"></span>
                <span id="status-text">Saved</span>
                <span class="file-path" id="file-path">No file open</span>
            </span>
        </div>

        <!-- Editor Container -->
        <div class="editor-container">

            <!-- Sidebar -->
            <div class="editor-sidebar" id="editor-sidebar">
                <div class="editor-sidebar-header">
                    <h4><i class="fas fa-folder-tree"></i> Explorer</h4>
                    <div>
                        <button class="btn btn-outline btn-sm" onclick="createFile()" title="New File">
                            <i class="fas fa-file"></i>
                        </button>
                        <button class="btn btn-outline btn-sm" onclick="createFolder()" title="New Folder">
                            <i class="fas fa-folder"></i>
                        </button>
                    </div>
                </div>
                <div class="editor-sidebar-body" id="file-tree-container">
                    <div class="file-tree">
                        <li class="folder-node">
                            <span class="folder-toggle" onclick="toggleFolder(this)">📂</span>
                            <span>src</span>
                            <div class="folder-children">
                                <li class="file-node active" onclick="openFile('src/index.js')">
                                    <span class="icon file-icon">📄</span>
                                    <span>index.js</span>
                                </li>
                                <li class="file-node" onclick="openFile('src/style.css')">
                                    <span class="icon file-icon">🎨</span>
                                    <span>style.css</span>
                                </li>
                                <li class="file-node" onclick="openFile('src/index.html')">
                                    <span class="icon file-icon">🌐</span>
                                    <span>index.html</span>
                                </li>
                            </div>
                        </li>
                        <li class="file-node" onclick="openFile('README.md')">
                            <span class="icon file-icon">📝</span>
                            <span>README.md</span>
                        </li>
                        <li class="file-node" onclick="openFile('package.json')">
                            <span class="icon file-icon">📋</span>
                            <span>package.json</span>
                        </li>
                    </div>
                </div>
            </div>

            <!-- Main Editor -->
            <div class="editor-main">

                <!-- Tabs -->
                <div class="editor-tabs" id="editor-tabs">
                    <div class="editor-tab active" onclick="switchTab('src/index.js')">
                        <span>index.js</span>
                        <span class="tab-close" onclick="event.stopPropagation(); closeTab('src/index.js')">×</span>
                    </div>
                </div>

                <!-- Editor Area -->
                <div class="editor-area">
                    <div id="editor-container"></div>
                </div>

                <!-- Terminal -->
                <div class="editor-terminal" id="terminal">
                    <div class="terminal-line">
                        <span class="terminal-prompt">$</span>
                        <span class="terminal-output">Welcome to Alpha Code Editor</span>
                    </div>
                    <div class="terminal-line">
                        <span class="terminal-prompt">$</span>
                        <span class="terminal-output">Type your code and press Run to execute</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // LOAD MONACO EDITOR
        // ============================================================
        let editor = null;
        let currentFile = 'src/index.js';
        let openTabs = ['src/index.js'];
        let isDirty = false;

        // Load Monaco Editor
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js';
        script.onload = () => {
            require.config({
                paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs' }
            });
            require(['vs/editor/editor.main'], () => {
                initEditor();
            });
        };
        document.head.appendChild(script);

        function initEditor() {
            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: `// Welcome to Alpha Code Editor\n// Start coding here...\n\nfunction hello() {\n  console.log('Hello, World!');\n}\n\nhello();`,
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                renderWhitespace: 'selection',
                fontFamily: 'Fira Code, monospace',
                fontLigatures: true,
                tabSize: 2,
                wordWrap: 'on',
            });

            // Auto-save
            editor.onDidChangeContent(() => {
                if (!isDirty) {
                    isDirty = true;
                    updateStatus(true);
                }
            });

            // Keyboard shortcuts
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
                saveFile();
            });

            // Update status
            updateStatus(false);
        }

        // ============================================================
        // STATUS
        // ============================================================
        function updateStatus(dirty) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if (dirty) {
                dot.className = 'dot unsaved';
                text.textContent = 'Unsaved';
            } else {
                dot.className = 'dot saved';
                text.textContent = 'Saved';
            }
        }

        // ============================================================
        // FILE OPERATIONS
        // ============================================================
        function openFile(file) {
            currentFile = file;
            document.getElementById('file-path').textContent = file;
            
            // Update active tab
            document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.file-node').forEach(f => f.classList.remove('active'));
            
            // Find and activate tab
            const tabs = document.querySelectorAll('.editor-tab');
            tabs.forEach(tab => {
                if (tab.textContent.trim() === file.split('/').pop()) {
                    tab.classList.add('active');
                }
            });
            
            // Find and activate file in tree
            document.querySelectorAll('.file-node').forEach(f => {
                if (f.textContent.trim() === file.split('/').pop()) {
                    f.classList.add('active');
                }
            });

            // Load file content (simulated)
            const content = getFileContent(file);
            if (editor) {
                const language = getLanguage(file);
                monaco.editor.setModelLanguage(editor.getModel(), language);
                editor.setValue(content);
                isDirty = false;
                updateStatus(false);
            }
        }

        function getFileContent(file) {
            // Simulated file content
            const files = {
                'src/index.js': `// Main application entry\n\nfunction hello() {\n  console.log('Hello, World!');\n}\n\nhello();`,
                'src/style.css': `/* Styles */\nbody {\n  margin: 0;\n  padding: 0;\n  background: #0a0a0a;\n}`,
                'src/index.html': `<!DOCTYPE html>\n<html>\n<head>\n  <title>My App</title>\n</head>\n<body>\n  <h1>Hello World</h1>\n</body>\n</html>`,
                'README.md': `# My Project\n\nThis is a sample project.`,
                'package.json': `{\n  "name": "my-project",\n  "version": "1.0.0",\n  "dependencies": {}\n}`
            };
            return files[file] || '// File not found';
        }

        function getLanguage(file) {
            const ext = file.split('.').pop().toLowerCase();
            const map = {
                js: 'javascript',
                ts: 'typescript',
                html: 'html',
                css: 'css',
                scss: 'scss',
                json: 'json',
                md: 'markdown',
                py: 'python',
                php: 'php',
                java: 'java',
                go: 'go',
                rs: 'rust',
                cpp: 'cpp',
                c: 'c',
                sh: 'shell',
                yml: 'yaml',
                xml: 'xml',
                sql: 'sql'
            };
            return map[ext] || 'plaintext';
        }

        function switchTab(file) {
            openFile(file);
        }

        function closeTab(file) {
            if (openTabs.length <= 1) {
                terminalLog('Cannot close the last tab', 'error');
                return;
            }
            openTabs = openTabs.filter(t => t !== file);
            renderTabs();
            if (currentFile === file) {
                openFile(openTabs[0]);
            }
        }

        function renderTabs() {
            const container = document.getElementById('editor-tabs');
            container.innerHTML = openTabs.map(file => `
                <div class="editor-tab ${file === currentFile ? 'active' : ''}" onclick="switchTab('${file}')">
                    <span>${file.split('/').pop()}</span>
                    <span class="tab-close" onclick="event.stopPropagation(); closeTab('${file}')">×</span>
                </div>
            `).join('');
        }

        // ============================================================
        // EDITOR ACTIONS
        // ============================================================
        function saveFile() {
            if (!editor) return;
            const content = editor.getValue();
            terminalLog(`Saving ${currentFile}...`, 'info');
            // Simulate save
            setTimeout(() => {
                isDirty = false;
                updateStatus(false);
                terminalLog(`✅ ${currentFile} saved successfully`, 'success');
            }, 500);
        }

        function undoAction() {
            if (editor) editor.trigger('keyboard', 'undo');
        }

        function redoAction() {
            if (editor) editor.trigger('keyboard', 'redo');
        }

        function formatCode() {
            if (editor) editor.getAction('editor.action.formatDocument').run();
            terminalLog('✨ Code formatted', 'success');
        }

        function runCode() {
            if (!editor) return;
            const content = editor.getValue();
            terminalLog('▶️ Running code...', 'info');
            
            try {
                // For demo, just log the output
                const output = [];
                const originalLog = console.log;
                console.log = (...args) => {
                    output.push(args.join(' '));
                    originalLog(...args);
                };
                
                // Execute code in a sandbox
                const fn = new Function(content);
                fn();
                
                console.log = originalLog;
                
                if (output.length > 0) {
                    output.forEach(line => terminalLog(`📤 ${line}`, 'output'));
                } else {
                    terminalLog('✅ Code executed successfully (no output)', 'success');
                }
            } catch (error) {
                terminalLog(`❌ Error: ${error.message}`, 'error');
            }
        }

        // ============================================================
        // FOLDER TREE
        // ============================================================
        function toggleFolder(element) {
            const children = element.parentElement.querySelector('.folder-children');
            if (children) {
                const isOpen = children.style.display !== 'none';
                children.style.display = isOpen ? 'none' : 'block';
                element.textContent = isOpen ? '📁' : '📂';
            }
        }

        function createFile() {
            const name = prompt('Enter file name:');
            if (!name) return;
            terminalLog(`📄 Creating file: ${name}`, 'info');
            setTimeout(() => {
                terminalLog(`✅ File ${name} created`, 'success');
            }, 300);
        }

        function createFolder() {
            const name = prompt('Enter folder name:');
            if (!name) return;
            terminalLog(`📁 Creating folder: ${name}`, 'info');
            setTimeout(() => {
                terminalLog(`✅ Folder ${name} created`, 'success');
            }, 300);
        }

        // ============================================================
        // TERMINAL
        // ============================================================
        function terminalLog(message, type = 'output') {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'terminal-line';
            
            const prefix = {
                'output': '📤',
                'info': 'ℹ️',
                'success': '✅',
                'error': '❌',
                'warning': '⚠️'
            };
            
            const color = {
                'output': 'terminal-output',
                'info': 'terminal-output',
                'success': 'terminal-success',
                'error': 'terminal-error',
                'warning': 'terminal-warning'
            };
            
            line.innerHTML = `
                <span class="terminal-prompt">$</span>
                <span class="${color[type] || 'terminal-output'}">${prefix[type] || '•'} ${message}</span>
            `;
            
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // ============================================================
        // LOGOUT & NAVIGATION
        // ============================================================
        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        // ============================================================
        // HAMBURGER & SCROLL
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger');
            const nav = document.getElementById('nav');

            if (hamburger && nav) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.toggle('active');
                    nav.classList.toggle('open');
                });

                document.querySelectorAll('.nav a').forEach(link => {
                    link.addEventListener('click', () => {
                        hamburger.classList.remove('active');
                        nav.classList.remove('open');
                    });
                });
            }

            const header = document.getElementById('header');
            window.addEventListener('scroll', () => {
                if (window.scrollY > 20) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            });

            // Toggle sidebar on mobile
            const sidebarToggle = document.querySelector('.editor-sidebar-header .btn');
            if (sidebarToggle) {
                // Add mobile sidebar toggle
            }
        });

        // Mobile sidebar toggle
        let sidebarOpen = false;
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 576) {
                const sidebar = document.getElementById('editor-sidebar');
                const target = e.target;
                if (target.closest('.editor-sidebar-header') || target.closest('.editor-toolbar .fa-folder-tree')) {
                    sidebarOpen = !sidebarOpen;
                    sidebar.classList.toggle('open', sidebarOpen);
                } else if (!target.closest('.editor-sidebar')) {
                    sidebar.classList.remove('open');
                    sidebarOpen = false;
                }
            }
        });

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            // Ctrl+Shift+P to run
            if (e.ctrlKey && e.shiftKey && e.key === 'P') {
                e.preventDefault();
                runCode();
            }
            // Ctrl+S to save
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveFile();
            }
        });

        // Initialize with welcome message
        setTimeout(() => {
            terminalLog('💡 Press Ctrl+S to save, Ctrl+Shift+P to run code', 'info');
        }, 1000);
    </script>
</body>
